base_url = "https://aminblg.github.io/blog"  # change to your domain if you ever get one
title = "sotch"
description = "terminal output"
compile_sass = true
minify_html = true
build_search_index = true
generate_feeds = true
feed_filenames = ["rss.xml"]

taxonomies = [
    {name = "tags", feed = true},
]

[markdown]
external_links_target_blank = true

[markdown.highlighting]
style = "class"
dark_theme = "catppuccin-mocha"
light_theme = "catppuccin-latte"

[search]
index_format = "elasticlunr_json"

[extra]
# ── Edit these to customize your site ──
prompt_user = "sotch"      # username in the terminal prompt
prompt_host = "blog"       # hostname in the terminal prompt
nav_links = [
    { label = "home", url = "/" },
    { label = "about", url = "/about/" },
    { label = "tags", url = "/tags/" },
    { label = "search", url = "/search/" },
]
rss_label = "rss"          # label for the RSS link in nav

# ── Theme / Colors ──
# To change the color scheme, edit sass/style.scss
# The Catppuccin tokens are CSS custom properties at the top of that file.
# Dark mode = Mocha (default), Light mode = Latte
# Syntax highlighting themes are set in [markdown.highlighting] above.
